<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4track – Record</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="time" id="time">0s</div>
    <label for="track-select" class="track-label">Track</label>
    <select id="track-select" class="track-select">
      <option value="0">Track 1</option>
      <option value="1">Track 2</option>
      <option value="2">Track 3</option>
      <option value="3">Track 4</option>
    </select>
    <label for="trim" class="trim-label">Trim
      <span class="trim-range">LINE</span>
      <input type="range" id="trim" min="-1" max="1" step="0.01" value="-1">
      <span class="trim-range">MIC</span>
    </label>
    <label for="rec-vol" class="trim-label">Volume
      <input type="range" id="rec-vol" min="0" max="1" step="0.01" value="0.75">
    </label>
    <div id="latency" class="latency" aria-live="polite"></div>
    <div class="controls">
      <button type="button" id="record">Record</button>
      <button type="button" id="stop" disabled>Stop</button>
      <button type="button" id="play" disabled>Play</button>
      <button type="button" id="pause" disabled>Pause</button>
      <button type="button" id="rewind" disabled>Rewind</button>
    </div>
    <div class="mixer">
      <div class="channel-strip">
        <span class="channel-label">Track 1</span>
        <label>Vol <input type="range" id="vol-0" min="0" max="1" step="0.01" value="0.5"></label>
        <label>Pan <input type="range" id="pan-0" min="-1" max="1" step="0.01" value="0"></label>
      </div>
      <div class="channel-strip">
        <span class="channel-label">Track 2</span>
        <label>Vol <input type="range" id="vol-1" min="0" max="1" step="0.01" value="0.5"></label>
        <label>Pan <input type="range" id="pan-1" min="-1" max="1" step="0.01" value="0"></label>
      </div>
      <div class="channel-strip">
        <span class="channel-label">Track 3</span>
        <label>Vol <input type="range" id="vol-2" min="0" max="1" step="0.01" value="0.5"></label>
        <label>Pan <input type="range" id="pan-2" min="-1" max="1" step="0.01" value="0"></label>
      </div>
      <div class="channel-strip">
        <span class="channel-label">Track 4</span>
        <label>Vol <input type="range" id="vol-3" min="0" max="1" step="0.01" value="0.5"></label>
        <label>Pan <input type="range" id="pan-3" min="-1" max="1" step="0.01" value="0"></label>
      </div>
    </div>
    <div class="master">
      <label class="master-label">Master Vol <input type="range" id="master-vol" min="0" max="0.9" step="0.01" value="0.5"></label>
    </div>
    <audio id="audio-1" hidden></audio>
    <audio id="audio-2" hidden></audio>
    <audio id="audio-3" hidden></audio>
    <audio id="audio-4" hidden></audio>
  </div>
  <script src="app.js"></script>
</body>
</html>
